<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usman Mobile Repairing Centre</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#0a0a0a;color:#fff}

/* NAV */
nav{display:flex;justify-content:space-between;padding:20px;background:#000;position:sticky;top:0}
.logo{color:#00f7ff;font-weight:bold}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(black, #001f2f);
}
.hero h1{color:#00f7ff;font-size:3rem}
.btn{
margin-top:20px;
padding:12px 25px;
background:#00f7ff;
color:#000;
border-radius:30px;
text-decoration:none;
}

/* SECTION */
section{padding:60px 10%;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#111;padding:20px;border-radius:10px}

/* GALLERY */
.gallery img{width:100%;border-radius:10px}

/* FOOTER */
footer{text-align:center;padding:20px;background:#000;color:#777}
</style>
</head>

<body>

<nav>
<div class="logo">Usman Mobile Centre</div>
</nav>

<div class="hero">
<h1>We Repair What Others Can't</h1>
<p>Expert Mobile Repair in Pattoki</p>
<a href="https://wa.me/923206882843?text=Assalamualaikum%20repair%20karwana%20hai" class="btn">WhatsApp</a>
</div>

<section>
<h2>Services</h2>
<div class="grid">
<div class="card">Hardware Repair</div>
<div class="card">Screen Replacement</div>
<div class="card">Software Fix</div>
</div>
</section>

<section>
<h2>Before / After</h2>
<div class="grid gallery">
<img src="https://via.placeholder.com/300x200">
<img src="https://via.placeholder.com/300x200">
<img src="https://via.placeholder.com/300x200">
</div>
</section>

<section>
<h2>Customer Reviews</h2>
<div class="grid">
<div class="card">"Best repair shop!"</div>
<div class="card">"Fast service 👍"</div>
<div class="card">"Highly recommended"</div>
</div>
</section>

<section>
<h2>Location</h2>
<iframe src="https://maps.google.com/maps?q=Pattoki&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="250" style="border:0"></iframe>
</section>

<footer>
© 2026 Usman Mobile Repairing Centre
</footer>

</body>
</html>
